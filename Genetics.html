const filterLectures = [
  { label: "All",                      val: "All" },
  { label: "Mendelian genetics",      val: "1" },
  { label: "Sex-Linked inheritance",            val: "2" },
  { label: "Linked genes",          val: "3" },
  { label: "Thalassemia",              val: "4" },
  { label: "Autosomal Recessive Inheritance",          val: "5" },
  { label: "New born screening",     val: "6" },
  { label: "Introduction to Genetics",             val: "7" },
  { label: "Extending of mendelian genetics",            val: "8" },
  { label: "Types of genetic diseases (disorders)",            val: "9" },
  { label: "Autosomal partly dominant inheritance",            val: "10" },
  { label: "Prenatal Genetic Testing",            val: "11" },
  { label: "Gene therapy",            val: "12" },
  { label: "Unkown",            val: "U" },
  
];

let currentSubject = "All";

const container = document.getElementById('quiz-content');
const filterBar = document.getElementById('filter-bar');

function renderFilterBar() {
    filterBar.innerHTML = filterLectures.map(f =>
        `<button class="filter-btn${f.val === currentSubject ? " active" : ""}" onclick="filterBySubject('${f.val}', this)">${f.label}</button>`
    ).join('');
}

function getLectureLabel(val) {
    if (val === "All") return "All";
    const found = filterLectures.find(f => f.val === val);
    return found ? found.label : val;
}

function updateSectionHeading() {
    const existing = document.getElementById('section-heading');
    const visibleBlocks = [...document.querySelectorAll('.q-block')].filter(b => b.style.display !== "none");
    const count = visibleBlocks.length;

    let noResultsMsg = document.getElementById('no-results-msg');
    if (count === 0) {
        if (!noResultsMsg) {
            noResultsMsg = document.createElement('div');
            noResultsMsg.id = 'no-results-msg';
            noResultsMsg.className = 'no-results';
            noResultsMsg.textContent = "No questions found.";
            container.appendChild(noResultsMsg);
        }
    } else if (noResultsMsg) {
        noResultsMsg.remove();
    }

    const label = getLectureLabel(currentSubject);
    const badgeText = count === 1 ? "1 MCQ" : `${count} MCQs`;

    if (existing) {
        existing.style.display = (count === 0) ? "none" : "flex";
        existing.querySelector('.section-heading-title').textContent = label;
        existing.querySelector('.mcq-count-badge').textContent = badgeText;
    } else if (count > 0) {
        const heading = document.createElement('div');
        heading.id = 'section-heading';
        heading.className = 'section-heading';
        heading.innerHTML = `<span class="section-heading-title">${label}</span><span class="mcq-count-badge">${badgeText}</span>`;
        container.insertBefore(heading, container.firstChild);
    }
}

function renderQuiz() {
    container.innerHTML = '';
    allQuestions.forEach(item => {
        const div = document.createElement('div');
        div.className = 'q-block';
        div.dataset.lecture = item.s;
        div.dataset.searchText = (item.q + " " + item.o.join(" ")).toLowerCase();

        const matchesSubject = currentSubject === "All" || item.s === currentSubject;
        div.style.display = matchesSubject ? "block" : "none";

        div.innerHTML = `
            <div class="q-text" data-original="${item.n}. ${item.q}">${item.n}. ${item.q}</div>
            <ul class="opts">
                ${item.o.map(opt => `<li data-original="${opt}">${opt}</li>`).join('')}
            </ul>
            <div class="ans-row">
                <button class="ans-btn" data-answer="Answer: ${item.a}" onclick="toggleAnswer(this)">Answer</button>
            </div>
        `;
        container.appendChild(div);
    });
    updateSectionHeading();
}

function filterBySubject(val, btn) {
    currentSubject = val;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    handleSearch();
}

function handleSearch() {
    const term = document.getElementById('search-input').value.toLowerCase();
    const blocks = document.querySelectorAll('.q-block');
    blocks.forEach(block => {
        resetBlock(block);
        const matchesCategory = currentSubject === "All" || block.dataset.lecture === currentSubject;
        const matchesSearch = term === "" || block.dataset.searchText.includes(term);
        if (matchesCategory && matchesSearch) {
            block.style.display = "block";
            if (term !== "") highlight(block, term);
        } else {
            block.style.display = "none";
        }
    });
    updateSectionHeading();
}

function resetBlock(block) {
    const qText = block.querySelector('.q-text');
    const opts = block.querySelectorAll('li');
    qText.innerHTML = qText.dataset.original;
    opts.forEach(li => li.innerHTML = li.dataset.original);
    block.classList.remove('revealed');
    const btn = block.querySelector('.ans-btn');
    if (btn && btn.dataset.answer) btn.textContent = 'Answer';
}

function highlight(block, term) {
    const regex = new RegExp(`(${term})`, 'gi');
    block.querySelector('.q-text').innerHTML = block.querySelector('.q-text').innerHTML.replace(regex, '<mark>$1</mark>');
    block.querySelectorAll('li').forEach(li => li.innerHTML = li.innerHTML.replace(regex, '<mark>$1</mark>'));
}

function toggleAnswer(btn) {
    const block = btn.closest('.q-block');
    const isRevealed = block.classList.toggle('revealed');
    btn.textContent = isRevealed ? btn.dataset.answer : 'Answer';
}

function toggleTheme() {
    const isLight = document.body.getAttribute('data-theme') === 'light';
    const newTheme = isLight ? '' : 'light';
    document.body.setAttribute('data-theme', newTheme);
    localStorage.setItem('theme', newTheme);
    document.getElementById('theme-icon').innerHTML = isLight 
        ? '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>'
        : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
}

(function () {
    if (localStorage.getItem('theme') === 'light') {
        document.body.setAttribute('data-theme', 'light');
        document.getElementById('theme-icon').innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
    }
}());

renderFilterBar();
renderQuiz();
</script>
