  { label: "All",                   val: "All" },
  { label: "2020 - 2021",           val: "21"  },
  { label: "2021 - 2022",           val: "22"  },
  { label: "2021 - 2022 Second Trial", val: "22S" },
  { label: "2022 - 2023",           val: "23"  },
  { label: "2023 - 2024",           val: "24"  },
  { label: "2024 - 2025",           val: "25"  },
];


let currentMode    = "lectures"; 
let currentSubject = "All";
let activeData     = dataLectures;


const container = document.getElementById('quiz-content');
const filterBar  = document.getElementById('filter-bar');

function renderFilterBar() {
    const filters = currentMode === "lectures" ? filterLectures : filterYears;
    filterBar.innerHTML = filters.map(f =>
        `<button class="filter-btn${f.val === "All" ? " active" : ""}" onclick="filterBySubject('${f.val}', this)">${f.label}</button>`
    ).join('');
}


function getLectureLabel(val) {
    if (val === "All") return "All";
    const found = filterLectures.find(f => f.val === val);
    return found ? found.label : val;
}

function countVisible() {
    return [...document.querySelectorAll('.q-block')]
        .filter(b => b.style.display !== "none").length;
}

function updateSectionHeading() {
    const existing = document.getElementById('section-heading');
    if (currentMode !== "lectures") {
        if (existing) existing.remove();
        return;
    }

    const label = getLectureLabel(currentSubject);
    const count = countVisible();
    const badgeText = count === 1 ? "1 MCQs" : `${count} MCQs`;

    if (existing) {
        existing.querySelector('.section-heading-title').textContent = label;
        existing.querySelector('.mcq-count-badge').textContent = badgeText;
    } else {
        const heading = document.createElement('div');
        heading.id = 'section-heading';
        heading.className = 'section-heading';
        heading.innerHTML = `
            <span class="section-heading-title">${label}</span>
            <span class="mcq-count-badge">${badgeText}</span>
        `;
        container.insertBefore(heading, container.firstChild);
    }
}

function renderQuiz() {
    container.innerHTML = '';
    activeData.forEach(item => {
        const div = document.createElement('div');
        div.className = 'q-block';
        div.dataset.subject    = item.s;
        div.dataset.searchText = (item.s + " " + item.q + " " + item.o.join(" ")).toLowerCase();

        if (currentMode === "lectures") {
        
            div.innerHTML = `
                <div class="q-text" data-original="${item.n}. ${item.q}">${item.n}. ${item.q}</div>
                <ul class="opts">
                    ${item.o.map(opt => `<li data-original="${opt}">${opt}</li>`).join('')}
                </ul>
                <div class="ans-row">
                    <button class="ans-btn" data-answer="Answer: ${item.a}" onclick="toggleAnswer(this)">Answer</button>
                    <span class="year-label">${item.y}</span>
                </div>
            `;
        } else {
            
            div.innerHTML = `
                <div class="q-text" data-original="${item.n}. ${item.q}">${item.n}. ${item.q}</div>
                <ul class="opts">
                    ${item.o.map(opt => `<li data-original="${opt}">${opt}</li>`).join('')}
                </ul>
                <div class="ans-row">
                    <span class="ans-text">Answer: ${item.a}</span>
                    <button class="ans-btn" onclick="this.closest('.q-block').classList.toggle('revealed')">Answer</button>
                </div>
            `;
        }
        container.appendChild(div);
    });

    updateSectionHeading();
}


function toggleFilterMode() {
    currentMode    = currentMode === "lectures" ? "years" : "lectures";
    activeData     = currentMode === "lectures" ? dataLectures : dataYears;
    currentSubject = "All";


    document.body.classList.toggle('mode-lectures', currentMode === "lectures");
    document.body.classList.toggle('mode-years',    currentMode === "years");

  
    const icon = document.getElementById('filter-icon');
    if (currentMode === "years") {
        icon.innerHTML = `
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>`;
    } else {
        icon.innerHTML = `
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>`;
    }

    renderFilterBar();
    renderQuiz();
    showTooltip();
}


let tooltipVisible = false;
const filterBtn   = document.getElementById('filter-mode-btn');
const tooltip     = document.getElementById('btn-tooltip');

function showTooltip() {
    tooltip.textContent = currentMode === "lectures" ? "By lectures" : "By years";
    tooltip.classList.add('visible');
    filterBtn.classList.add('glowing');
    tooltipVisible = true;
}

function hideTooltip() {
    tooltip.classList.remove('visible');
    filterBtn.classList.remove('glowing');
    tooltipVisible = false;
}

filterBtn.addEventListener('mouseenter', showTooltip);
filterBtn.addEventListener('mouseleave', hideTooltip);

document.addEventListener('pointerdown', function(e) {
    if (tooltipVisible && !filterBtn.contains(e.target)) {
        hideTooltip();
    }
});


window.addEventListener('scroll', function() {
    if (tooltipVisible) hideTooltip();
}, { passive: true });


function toggleAnswer(btn) {
    const block = btn.closest('.q-block');
    const isRevealed = block.classList.contains('revealed');
    if (isRevealed) {
        block.classList.remove('revealed');
        btn.textContent = 'Answer';
    } else {
        block.classList.add('revealed');
        btn.textContent = btn.dataset.answer;
    }
}

function filterBySubject(subject, btn) {
    currentSubject = subject;
    document.getElementById('search-input').value = '';
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const blocks = document.querySelectorAll('.q-block');
    blocks.forEach(block => {
        resetBlock(block);
        block.style.display = (subject === 'All' || block.dataset.subject === subject) ? "block" : "none";
    });
    updateSectionHeading();
}

function handleSearch() {
    const searchTerm = document.getElementById('search-input').value.toLowerCase();
    const blocks = document.querySelectorAll('.q-block');
    blocks.forEach(block => {
        resetBlock(block);
        const matchesSubject = currentSubject === "All" || block.dataset.subject === currentSubject;
        const matchesSearch  = searchTerm === "" || block.dataset.searchText.includes(searchTerm);
        if (matchesSubject && matchesSearch) {
            block.style.display = "block";
            if (searchTerm !== "") highlight(block, searchTerm);
        } else {
            block.style.display = "none";
        }
    });
    updateSectionHeading();
}

function resetBlock(block) {
    const qText = block.querySelector('.q-text');
    const opts  = block.querySelectorAll('li');
    qText.innerHTML = qText.dataset.original;
    opts.forEach(li => li.innerHTML = li.dataset.original);
    const btn = block.querySelector('.ans-btn');
    if (block.classList.contains('revealed')) {
        block.classList.remove('revealed');
        if (btn && btn.dataset.answer) btn.textContent = 'Answer';
    }
}

function highlight(block, term) {
    const regex = new RegExp(`(${term})`, 'gi');
    const qText = block.querySelector('.q-text');
    const opts  = block.querySelectorAll('li');
    qText.innerHTML = qText.innerHTML.replace(regex, '<mark>$1</mark>');
    opts.forEach(li => { li.innerHTML = li.innerHTML.replace(regex, '<mark>$1</mark>'); });
}


function toggleTheme() {
    const body = document.body;
    const icon = document.getElementById('theme-icon');
    const isLight = body.getAttribute('data-theme') === 'light';
    if (isLight) {
        body.removeAttribute('data-theme');
        localStorage.removeItem('theme');
        icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
    } else {
        body.setAttribute('data-theme', 'light');
        localStorage.setItem('theme', 'light');
        icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
    }
}
if (localStorage.getItem('theme') === 'light') {
    document.body.setAttribute('data-theme', 'light');
    document.getElementById('theme-icon').innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
}

document.body.classList.add('mode-lectures');
renderFilterBar();
renderQuiz();
const firstFilterBtn = document.querySelector('.filter-btn');
filterBySubject("All", firstFilterBtn);
</script>
</body>
