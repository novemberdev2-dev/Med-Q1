<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All questions_BBB_2025-2026</title>

    <style>
       :root {
            --bg-body: #121212;
            --text-main: #f1f5f9;
            --text-opts: #f1f5f9;
            --header-bg: #1e293b;
            --header-text: #38bdf8;
            --border-color: #26292b;
            --input-bg: #1a1c1e;
            --input-border: #2a2f36;
            --ans-bg: #1e293b;
            --ans-text: #f0cf6a;
            --filter-bg: transparent;
            --filter-txt-active: #1A1A1A;
            --filter-bg-active:  #ffffff;
            --filter-border-active:  #ffffff;
            --ans-btn-bg: #E8E8E8;
            --ans-btn-txt: #1A1A1A;
        }

        [data-theme="light"] {
            --bg-body: #ffffff;
            --text-main: #000000;
            --text-opts: #333333;
            --header-bg: #2D2D2D;
            --header-text: #ffffff;
            --border-color: #e0e0e0;
            --input-bg: #ffffff;
            --input-border: #cccccc;
            --ans-bg: #eef6e4;
            --ans-text: #2e7d32;
            --filter-bg: transparent;
            --filter-txt-active:  #ffffff;
            --filter-bg-active: #4D4D4D;
            --filter-border-active: #4D4D4D;
            --ans-btn-bg:  #555555;
            --ans-btn-txt: #ffffff;
        }

        .filter-btn.active {
            background-color: var(--filter-bg-active);
            color: var(--filter-txt-active);
            border-color: var(--filter-border-active);
        }

        body {
            -webkit-user-select: none;
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            transition: background-color 0.3s ease;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1150px;
            padding: 20px;
            box-sizing: border-box;
        }

        .header { 
            text-align: center; 
            margin-bottom: 20px;
            background-color: var(--header-bg);
            color: var(--header-text);
            padding: 16px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .controls-row { display: flex; gap: 12px; margin-bottom: 15px; }

        .search-wrapper {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
        }

        .search-wrapper svg {
            position: absolute;
            left: 12px;
            color: var(--text-opts);
            z-index: 1;
        }

        #search-input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            font-size: 1.1rem;
            border: 1px solid var(--input-border);
            background-color: var(--input-bg);
            color: var(--text-main);
            border-radius: 7px;
            outline: none;
        }

        .theme-toggle {
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-main);
            width: 48px;
            height: 48px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .filter-container {
            background: transparent;
            border: none;
            padding: 0;
            margin-bottom: 20px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            overflow-y: hidden;
            flex-wrap: nowrap;
            max-width: 100%;
            box-sizing: border-box;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .filter-container::-webkit-scrollbar { display: none; }

        .filter-btn {
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-main);
            padding: 9px 16px;
            border-radius: 6px;
            font-size: 0.84rem;
            font-weight: 700;
            transition: all 0.2s;
            flex: 0 0 auto;
            white-space: nowrap;
            margin-bottom: 10px;
            margin-top: 10px;
        }

        .divider { border: none; margin-bottom: 12px; }

        .q-block {
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 30px;
        }

        .q-block:last-child { border-bottom: none; }
        .q-text { font-size: 1.15rem; font-weight: 600; margin-bottom: 12px; line-height: 1.5; }
        .opts { list-style-type: none; padding: 0; line-height: 1.7; font-size: 1.05rem; color: var(--text-opts); margin-bottom: 15px; }

        .ans-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ans-btn {
            background-color: var(--ans-btn-bg);
            color: var(--ans-btn-txt);
            border: none;
            padding: 7px 20px;
            border-radius: 4px;
            margin-top: 20px;
            font-weight: 650;
            font-size: 16px;
        }

        .q-block.revealed .ans-btn {
            background-color: var(--ans-bg);
            color: var(--ans-text);
            font-weight: 700;
            padding: 7px 12px;
            font-size: 16px;
        }

        mark { background-color: #f0cf6a; color: #000; }

        .section-heading {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 14px;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border-color);
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-opts);
            font-size: 1.15rem;
            font-weight: 500;
            opacity: 0.6;
            box-sizing: border-box;
            width: 100%;
            display: block; 
        }

        .section-heading-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .mcq-count-badge {
            font-size: 0.70rem;
            font-weight: 700;
            color: var(--text-main);
            border: 1px solid var(--text-main);
            padding: 2px 5px;
            border-radius: 3px;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }
    </style>

</head>

<body oncontextmenu="return false;">

<div class="container">
    <div class="header">
        <div style="text-align: left;">
            <h3 style="margin: 0; font-size: 1.4rem;">End-Rotation</h3>
            <p style="margin: 2px 0 0; font-size: 0.9rem; opacity: 0.8;">BBB • 2025-2026 • Round 2</p>
        </div>
    </div>

    <div class="controls-row">
        <div class="search-wrapper">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="search-input" placeholder="Search questions..." onkeyup="handleSearch()">
        </div>
        
        <button class="theme-toggle" onclick="toggleTheme()">
            <svg id="theme-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
        </button>
    </div>

    <div class="filter-container" id="filter-bar"></div>

    <hr class="divider">
    <div id="quiz-content"></div>
</div>

<script>

const allQuestions = [
  { n: 1, s: "Biochemistry",q: "Aspirin is:", o: ["A. Acetyl salicylic acid", "B. Methyl salicylate ", "C. Sodium salicylate", "D. Phenyl salicylate", "E. Salicylic acid"], a: "A" },
   
    { n:2,  s:"Biochemistry", q:"Hemiketal is formed from:", o:["A. Ketone + water","B. Aldehyde + Water","C. Aldehyde + phenol","D. Aldehyde + Alcohol","E. Ketone + Alcohol"], a:"E" },
    { n:3,  s:"Biochemistry", q:"__________ is an essential fatty acid.",  o:["A. Linoleic acid","B. Palmatic acid","C. Palmitoleic acid","D. Oleic acid","E. Stearic acid"], a:"A" },
    { n:4,  s:"Biochemistry", q:"__________ is a polar, uncharged essential amino acid that contains (-OH) group.",  o:["A. Glycine","B. Serine","C. Methionine","D. Threonine","E. Cysteine"], a:"D" },
    
    
{ n:5, s:"Biochemistry", q:"Uric acid is a product of catabolism of __________.", o:["A. Albumin","B. Cysteine","C. Guanine","D. Thymine","E. Uracil"], a:"C" },

{ n:6, s:"Biochemistry", q:"0.1 mole of MgCl₂ is equal to:", o:["A. 0.2 osmole","B. 0.4 osmole","C. 0.5 osmole","D. 0.1 osmole","E. 0.3 osmole"], a:"E" },

 { n:7, s:"Biochemistry", q:"Salicylates function as:", o:["A. Vitamins and minerals","B. Analgesics and antipyretics","C. Minerals and electrolytes","D. Proteins and enzymes","E. Hormones and neurotransmitters"], a:"B" },
 
 
{ n:8, s:"Biochemistry", q:"Anti-scurvy vitamin:", o:["A. Is a fat soluble vitamin","B. Is essential for collagen synthesis","C. Is the most effective antioxidant agent","D. Its deficiency causes some abnormalities like osteomalacia","E. Mainly found in dairy products"], a:"B" },

{ n:9, s:"Biochemistry", q:"Which of the following Is NOT a symptom of metabolic alkalosis?", o:["A. Increased oxy-Hgb affinity","B. Hypokalemia","C. Seizures","D. Hyperventilation, respiratory depression","E. Decreased cerebral blood flow"], a:"E" },
  
    { n:10, s:"Biochemistry", q:"All of the following are correct about antioxidants, EXCEPT:", o:["A. One example of non-enzymatic antioxidant is glutathione","B. Generally produced by the human body","C. They are classified into two groups according to their function","D. Antioxidants protect cells from free radical damage","E. Vitamin C is an antioxidant"], a:"B" },
    { n:11, s:"Biochemistry", q:"Polysaccharides are:", o:["A. Examples of polysaccharides include cellulose, glycogen, and raffinose","B. Mainly composed of glucose monosaccharide units","C. Composed of 3–8 monosaccharide units","D. Cannot be completely digested by the human body","E. Large carbohydrates formed from many monosaccharide units"], a:"B" },

{ n:12, s:"Biochemistry", q:"Sugar alcohols are:", o:["A. Used as high-calorie sweeteners","B. Highly digestible sugars","C. Fermented rapidly by oral bacteria","D. Commonly used as low-calorie sweeteners","E. Taste like glucose sugars but do not significantly increase blood glucose"], a:"E" },

  { n:13, s:"Biophysics", q:"The electron source in X-ray tube is:", o:["A. Anode","B. Cathode","C. Filament","D. Tungsten target","E. Glass envelope"], a:"B" },
    
    { n:14, s:"Biophysics", q:"What is the function of the transducer in sonography?", o:["A. It transmits and receives ultrasound waves","B. It produces X-rays","C. It measures blood glucose level","D. It amplifies magnetic fields","E. It records electrical activity of the heart"], a:"A" },
    
    { n:15, s:"Biophysics", q:"What happens to blood vessels in chronic hypertension?", o:["A. Increased pressure on vessel wall leads to thickening and reduced elasticity","B. Vessel walls become thinner and more fragile","C. Complete loss of smooth muscle cells occurs immediately","D. Vasodilation with increased elasticity develops","E. No structural changes occur in blood vessels"], a:"A" },
    
   { n:16, s:"Biophysics", q:"Na⁺/K⁺ pump maintains membrane potential by what mechanism?", o:["A. Active transport of 3 Na⁺ out and 2 K⁺ into the cell","B. Passive diffusion of Na⁺ and K⁺ down their gradients","C. Movement of 2 Na⁺ in and 3 K⁺ out of the cell","D. Equal exchange of Na⁺ and K⁺ ions","E. No energy-dependent transport is involved"], a:"A" },

{ n:17, s:"Biophysics", q:"Which ion mainly maintains resting membrane polarization?", o:["A. Potassium (K⁺)","B. Sodium (Na⁺)","C. Calcium (Ca²⁺)","D. Chloride (Cl⁻)","E. Magnesium (Mg²⁺)"], a:"A" },
    
    { n:19, s:"Basic emergency care", q:"Unconscious patient with neck pain and snoring/gurgling breathing, What is the first management?", o:["A. Jaw thrust maneuver","B. Head tilt-chin lift maneuver","C. Give oral fluids","D. Sit the patient upright","E. Perform abdominal thrust"], a:"A" },
   { n:17, s:"Basic emergency care", q:"A patient has HR 100 and RR 4/min. What is the first management?", o:["A. Put him in a recovery position","B. Endotracheal intubation","C. Bag-valve-mask (BVM) ventilation","D. Administer naloxone immediately","E. Observe and monitor only"], a:"C" },
];

const filterLectures = [
  { label: "All",                      val: "All" },
  { label: "Biochemistry 🧪",               val: "Biochemistry" },
  { label: "Biophysics ⚛️",            val: "Biophysics" },
  { label: "Basic emergency care ⚕️",          val: "Basic emergency care" },
];

let currentSubject = "All";

const container = document.getElementById('quiz-content');
const filterBar = document.getElementById('filter-bar');

function renderFilterBar() {
    filterBar.innerHTML = filterLectures.map(f =>
        `<button class="filter-btn${f.val === currentSubject ? " active" : ""}" onclick="filterBySubject('${f.val}', this)">${f.label}</button>`
    ).join('');
}

function getLectureLabel(val) {
    if (val === "All") return "All";
    const found = filterLectures.find(f => f.val === val);
    return found ? found.label : val;
}

function updateSectionHeading() {
    const existing = document.getElementById('section-heading');
    const visibleBlocks = [...document.querySelectorAll('.q-block')].filter(b => b.style.display !== "none");
    const count = visibleBlocks.length;

    let noResultsMsg = document.getElementById('no-results-msg');
    if (count === 0) {
        if (!noResultsMsg) {
            noResultsMsg = document.createElement('div');
            noResultsMsg.id = 'no-results-msg';
            noResultsMsg.className = 'no-results';
            noResultsMsg.textContent = "No questions found.";
            container.appendChild(noResultsMsg);
        }
    } else if (noResultsMsg) {
        noResultsMsg.remove();
    }

    const label = getLectureLabel(currentSubject);
    const badgeText = count === 1 ? "1 MCQ" : `${count} MCQs`;

    if (existing) {
        existing.style.display = (count === 0) ? "none" : "flex";
        existing.querySelector('.section-heading-title').textContent = label;
        existing.querySelector('.mcq-count-badge').textContent = badgeText;
    } else if (count > 0) {
        const heading = document.createElement('div');
        heading.id = 'section-heading';
        heading.className = 'section-heading';
        heading.innerHTML = `<span class="section-heading-title">${label}</span><span class="mcq-count-badge">${badgeText}</span>`;
        container.insertBefore(heading, container.firstChild);
    }
}

function renderQuiz() {
    container.innerHTML = '';
    allQuestions.forEach(item => {
        const div = document.createElement('div');
        div.className = 'q-block';
        div.dataset.lecture = item.s;
        div.dataset.searchText = (item.q + " " + item.o.join(" ")).toLowerCase();

        const matchesSubject = currentSubject === "All" || item.s === currentSubject;
        div.style.display = matchesSubject ? "block" : "none";

        div.innerHTML = `
            <div class="q-text" data-original="${item.n}. ${item.q}">${item.n}. ${item.q}</div>
            <ul class="opts">
                ${item.o.map(opt => `<li data-original="${opt}">${opt}</li>`).join('')}
            </ul>
            <div class="ans-row">
                <button class="ans-btn" data-answer="Answer: ${item.a}" onclick="toggleAnswer(this)">Answer</button>
            </div>
        `;
        container.appendChild(div);
    });
    updateSectionHeading();
}

function filterBySubject(val, btn) {
    currentSubject = val;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    handleSearch();
}

function handleSearch() {
    const term = document.getElementById('search-input').value.toLowerCase();
    const blocks = document.querySelectorAll('.q-block');
    blocks.forEach(block => {
        resetBlock(block);
        const matchesCategory = currentSubject === "All" || block.dataset.lecture === currentSubject;
        const matchesSearch = term === "" || block.dataset.searchText.includes(term);
        if (matchesCategory && matchesSearch) {
            block.style.display = "block";
            if (term !== "") highlight(block, term);
        } else {
            block.style.display = "none";
        }
    });
    updateSectionHeading();
}

function resetBlock(block) {
    const qText = block.querySelector('.q-text');
    const opts = block.querySelectorAll('li');
    qText.innerHTML = qText.dataset.original;
    opts.forEach(li => li.innerHTML = li.dataset.original);
    block.classList.remove('revealed');
    const btn = block.querySelector('.ans-btn');
    if (btn && btn.dataset.answer) btn.textContent = 'Answer';
}

function highlight(block, term) {
    const regex = new RegExp(`(${term})`, 'gi');
    block.querySelector('.q-text').innerHTML = block.querySelector('.q-text').innerHTML.replace(regex, '<mark>$1</mark>');
    block.querySelectorAll('li').forEach(li => li.innerHTML = li.innerHTML.replace(regex, '<mark>$1</mark>'));
}

function toggleAnswer(btn) {
    const block = btn.closest('.q-block');
    const isRevealed = block.classList.toggle('revealed');
    btn.textContent = isRevealed ? btn.dataset.answer : 'Answer';
}

function toggleTheme() {
    const isLight = document.body.getAttribute('data-theme') === 'light';
    const newTheme = isLight ? '' : 'light';
    document.body.setAttribute('data-theme', newTheme);
    localStorage.setItem('theme', newTheme);
    document.getElementById('theme-icon').innerHTML = isLight 
        ? '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>'
        : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
}

(function () {
    if (localStorage.getItem('theme') === 'light') {
        document.body.setAttribute('data-theme', 'light');
        document.getElementById('theme-icon').innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
    }
}());

renderFilterBar();
renderQuiz();
</script>
</body>
</html>
