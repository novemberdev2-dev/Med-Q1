            align-items: center;

</head>

        lab: '6', year: 'U', badge: 'Unknown year',

    {
        id: 'q44',
        lab: '7', year: 'U', badge: 'Unknown year',
        question: '<strong>44.</strong> What laboratory method can be used to measure surface tension?',
        answer: 'Millon\'s Test. (I think it is a wrong answer but it was like that in the past papers)'
    },
];


const labGroups = [
    { key: '1', label: 'Lab 1 - Practical medical chemistry & lab safety' },
    { key: '2', label: 'Lab 2 - Analysis of antacid by titration' },
    { key: '3', label: 'Lab 3 - Carbohydrates' },
    { key: '4', label: 'Lab 4 - Qualitative test for protein and amino acid' },
    { key: '5', label: 'Lab 5 - Normal urine' },
    { key: '6', label: 'Lab 6 - Abnormal urine' },
    { key: '7', label: 'Unknown lab' },
];

const yearGroups = [
    { key: '22', label: '2021-2022' },
    { key: '23', label: '2022-2023' },
    { key: '24', label: '2023-2024' },
    { key: '25', label: '2024-2025' },
    { key: 'U',  label: 'Unknown years' },
];

const filterConfigs = {
    lecture: {
        buttons: [{ label: 'All Labs', subject: 'All' }, ...labGroups.map(g => ({ label: g.label.split(' - ')[0], subject: g.key }))],
    },
    year: {
        buttons: [{ label: 'All Years', subject: 'All' }, ...yearGroups.map(g => ({ label: g.label, subject: g.key }))],
    }
};


let currentMode = 'lecture';
let currentFilter = 'All';

function countFor(groups, groupKey, questionKey) {
    return questions.filter(q => q[questionKey] === groupKey).length;
}

function renderCard(q) {
    const imgHtml = q.img
        ? `<div class="image-section"><img src="${q.img}" alt="Exam Image"></div>`
        : '';
    
    return `
        <div class="quiz-card" data-lab="${q.lab}" data-year="${q.year}" data-id="${q.id}">
            <div class="question-section">
                <div class="question-item">
                    <span data-original="">${q.question}</span><br><br>
                    <button class="ans-btn" onclick="toggleAnswer('${q.id}', this)">Show Answer</button>
                    <div id="${q.id}" class="answer-box">${q.answer}</div>
                </div>
            </div>
            ${imgHtml}
            <div class="badge-box">${q.badge}</div>
        </div>`;
}

function renderContent() {
    const container = document.getElementById('main-content');
    let html = '';

    const groups = currentMode === 'lecture' ? labGroups : yearGroups;
    const groupKey = currentMode === 'lecture' ? 'lab' : 'year';

    groups.forEach(group => {
        const groupQuestions = questions.filter(q => q[groupKey] === group.key);
        if (groupQuestions.length === 0) return;
        const count = groupQuestions.length;
        html += `<div class="lab-wrapper" data-group="${group.key}">
            <div class="lab-title">${group.label}<span class="Q-number">${count} Question${count !== 1 ? 's' : ''}</span></div>
            ${groupQuestions.map(renderCard).join('')}
        </div>`;
    });

    container.innerHTML = html;

    
    container.querySelectorAll('.question-item span').forEach(span => {
        span.dataset.original = span.innerHTML;
    });
}


function buildFilterBar(mode) {
    const bar = document.getElementById('filter-bar');
    bar.innerHTML = '';
    filterConfigs[mode].buttons.forEach((item, idx) => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (idx === 0 ? ' active' : '');
        btn.textContent = item.label;
        btn.dataset.subject = item.subject;
        btn.onclick = () => filterItems(item.subject, btn);
        bar.appendChild(btn);
    });
}

function filterItems(subject, clickedBtn) {
    document.getElementById('search-input').value = '';
    currentFilter = subject;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    clickedBtn.classList.add('active');

    document.querySelectorAll('.lab-wrapper').forEach(wrap => {
        wrap.style.display = (subject === 'All' || wrap.dataset.group === subject) ? 'block' : 'none';
    });
    document.querySelectorAll('.quiz-card').forEach(card => card.style.display = 'flex');

    
    document.querySelectorAll('.question-item span').forEach(span => {
        if (span.dataset.original) span.innerHTML = span.dataset.original;
    });
}


const ICON_BOOK = `<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>`;
const ICON_CALENDAR = `<rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line>`;

function toggleFilterMode() {
    const btn = document.getElementById('filter-mode-btn');
    const icon = document.getElementById('filter-icon');

    // reset answer buttons
    document.querySelectorAll('.ans-btn').forEach(b => {
        b.innerText = 'Show Answer';
        b.classList.remove('revealed');
        b.style.backgroundColor = '';
    });
    document.getElementById('search-input').value = '';
    currentFilter = 'All';

    if (currentMode === 'lecture') {
        currentMode = 'year';
        icon.innerHTML = ICON_CALENDAR;
        btn.setAttribute('data-tooltip', 'By Years');
    } else {
        currentMode = 'lecture';
        icon.innerHTML = ICON_BOOK;
        btn.setAttribute('data-tooltip', 'By Lectures');
    }

    buildFilterBar(currentMode);
    renderContent();
}


function toggleAnswer(id, btn) {
    const answerDiv = document.getElementById(id);
    if (!btn.classList.contains('revealed')) {
        btn.innerText = answerDiv.innerText;
        btn.classList.add('revealed');
    } else {
        btn.innerText = 'Show Answer';
        btn.classList.remove('revealed');
    }
}

function handleSearch() {
    const searchTerm = document.getElementById('search-input').value.toLowerCase();
    const cards = document.querySelectorAll('.quiz-card');
    const wrappers = document.querySelectorAll('.lab-wrapper');

    if (searchTerm !== '') {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        const allBtn = document.querySelector('.filter-btn');
        if (allBtn) allBtn.classList.add('active');
        wrappers.forEach(w => w.style.display = 'block');
    }

    cards.forEach(card => {
        const span = card.querySelector('.question-item span');
        const answerBox = card.querySelector('.answer-box');
        const questionText = span.innerText;
        const answerText = answerBox.innerText;
        const combinedText = (questionText + ' ' + answerText).toLowerCase();

        span.innerHTML = span.dataset.original;

        if (searchTerm === '') {
            const group = card.closest('.lab-wrapper').dataset.group;
            card.style.display = (currentFilter === 'All' || currentFilter === group) ? 'flex' : 'none';
        } else if (combinedText.includes(searchTerm)) {
            card.style.display = 'flex';
            const regex = new RegExp(`(${searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            span.innerHTML = span.dataset.original.replace(regex, '<mark>$1</mark>');
        } else {
            card.style.display = 'none';
        }
    });

    wrappers.forEach(wrap => {
        const hasVisible = Array.from(wrap.querySelectorAll('.quiz-card')).some(c => c.style.display === 'flex');
        wrap.style.display = hasVisible ? 'block' : 'none';
    });
}


function toggleTheme() {
    const body = document.body;
    const icon = document.getElementById('theme-icon');
    const isLight = body.getAttribute('data-theme') === 'light';
    if (isLight) {
        body.removeAttribute('data-theme');
        localStorage.setItem('theme', 'dark');
        icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
    } else {
        body.setAttribute('data-theme', 'light');
        localStorage.setItem('theme', 'light');
        icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
    }
}


const savedTheme = localStorage.getItem('theme');
if (savedTheme === 'light') {
    document.body.setAttribute('data-theme', 'light');
    document.getElementById('theme-icon').innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
}

buildFilterBar('lecture');
document.getElementById('filter-mode-btn').setAttribute('data-tooltip', 'By Lectures');
renderContent();
</script>
