{ n: 166, s: "20", q: "Following statement about plasma membrane is correct:", o: ["A. Does not contain unsaturated fatty acids", "B. Lipids in the cell membrane may be covalently bound to carbohydrate residues", "C. Proteins in the cell membrane may comprise 10% or less of the membrane mass", "D. Lipids in the cell membrane are arranged symmetrically", "E. Lipids in the cell membrane diffuse easily across the lipid bilayer"], a: "B" },

{ n: 167, s: "20", q: "Fetal hemoglobin has a greater affinity for oxygen than maternal hemoglobin because it is composed of:", o: ["A. Two alpha and two beta subunits", "B. Four alpha subunits", "C. Two alpha and two gamma subunits", "D. Two beta and two gamma subunits", "E. Four gamma subunits"], a: "C" },
];


const container = document.getElementById('quiz-content');

function renderQuiz() {
    container.innerHTML = '';
    data.forEach(item => {
        const div = document.createElement('div');
        div.className = 'q-block';
        div.dataset.subject = item.s;
        div.dataset.searchText = (item.s + " " + item.q + " " + item.o.join(" ")).toLowerCase();
        div.innerHTML = `
            <div class="q-text" data-original="${item.n}. ${item.q}">${item.n}. ${item.q}</div>
            <ul class="opts">
                ${item.o.map(opt => `<li data-original="${opt}">${opt}</li>`).join('')}
            </ul>
            <div class="ans-row">
                <span class="ans-text">Answer: ${item.a}</span>
                <button class="ans-btn" onclick="this.closest('.q-block').classList.toggle('revealed')">Answer</button>
            </div>
        `;
        container.appendChild(div);
    });
}

function filterBySubject(subject, btn) {
    currentSubject = subject;   
    document.getElementById('search-input').value = '';

    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const blocks = document.querySelectorAll('.q-block');
    blocks.forEach(block => {
        resetBlock(block);

        if (subject === 'All' || block.dataset.subject === subject) {
            block.style.display = "block";
        } else {
            block.style.display = "none";
        }
    });
}

function handleSearch() {
    const searchTerm = document.getElementById('search-input').value.toLowerCase();
    const blocks = document.querySelectorAll('.q-block');

    blocks.forEach(block => {
        resetBlock(block);

        const matchesSubject =
            currentSubject === "All" ||
            block.dataset.subject === currentSubject;

        const matchesSearch =
            searchTerm === "" ||
            block.dataset.searchText.includes(searchTerm);

        if (matchesSubject && matchesSearch) {
            block.style.display = "block";

            if (searchTerm !== "") {
                highlight(block, searchTerm);
            }
        } else {
            block.style.display = "none";
        }
    });
}

function resetBlock(block) {
    const qText = block.querySelector('.q-text');
    const opts = block.querySelectorAll('li');

    qText.innerHTML = qText.dataset.original;
    opts.forEach(li => li.innerHTML = li.dataset.original);
}

function highlight(block, term) {
    const regex = new RegExp(`(${term})`, 'gi');
    const qText = block.querySelector('.q-text');
    const opts = block.querySelectorAll('li');

    qText.innerHTML = qText.innerHTML.replace(regex, '<mark>$1</mark>');
    opts.forEach(li => {
        li.innerHTML = li.innerHTML.replace(regex, '<mark>$1</mark>');
    });
}

renderQuiz();

const firstFilterBtn = document.querySelector('.filter-btn');
filterBySubject("All", firstFilterBtn);
