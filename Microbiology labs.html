function renderCard(q) {
    const parts = q.parts || [{ question: q.question, answer: q.answer }];

    const repeatHtml = q.repeat
        ? `<h3 class="question-number"><span class="repeat">${q.repeat}</span></h3>`
        : (q.number ? `<h3 class="question-number">${q.number}.</h3>` : '');

    const partsHtml = parts.map((part, i) => `
        <div class="question-item">
            <span>${part.question}</span><br><br>
            <button class="ans-btn" onclick="toggleAnswer('${q.id}_${i}', this)">Show Answer</button>
            <div id="${q.id}_${i}" class="answer-box">${part.answer}</div>
        </div>`).join('');

    const imgSection = q.img
    ? `<div class="image-section">
        ${
            Array.isArray(q.img)
? `<div style="display:flex;flex-direction:column;width:100%; gap:10px;">
    ${q.img.map((src, idx) => `
      <div style="position:relative;">
        <span style="position:absolute;top:8px;left:10px;z-index:1;font-weight:bold;font-size:1.1rem;color:white;background:rgba(0,0,0,0.5);padding:2px 8px;border-radius:4px;">${String.fromCharCode(65+idx)}</span>
        <img src="${src}" alt="Exam Image" style="width:100%;display:block;">
        
      </div>`).join('')}
  </div>`
            : `<img src="${q.img}" alt="Exam Image" ${q.imgStyle ? `style="${q.imgStyle}"` : ''}>`
        }
       </div>`
    : '';

    return `
        <div class="quiz-card" data-lab="${q.lab}">
            <div class="question-section">
                ${repeatHtml}${partsHtml}
            </div>
            ${imgSection}
        </div>`;
}

function renderContent() {
    const container = document.getElementById('main-content');
    let html = '';
    labGroups.forEach(group => {
        const groupQuestions = questions.filter(q => q.lab === group.key);
        if (groupQuestions.length === 0) return;
        html += `<div class="lab-wrapper" data-subject="${group.key}">
    <div class="lab-center"><div class="lab-title">${group.label}<span class="Q-number">${groupQuestions.length} Questions</span></div></div>
            ${groupQuestions.map(renderCard).join('')}
        </div>`;
    });
    container.innerHTML = html;
}


function filterLabs(subject, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.lab-wrapper').forEach(wrap => {
        wrap.style.display = (subject === 'All' || wrap.dataset.subject === subject) ? 'block' : 'none';
    });
}


function toggleAnswer(id, btn) {
    const answerDiv = document.getElementById(id);
    if (!btn.classList.contains('revealed')) {
        btn.innerText = answerDiv.innerText;
        btn.classList.add('revealed');
    } else {
        btn.innerText = 'Show Answer';
        btn.classList.remove('revealed');
    }
}


function toggleTheme() {
